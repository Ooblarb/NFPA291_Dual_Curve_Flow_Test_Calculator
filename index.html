<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFPA 291 Dual Flow Curve Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#f2f2f2;--card:#ffffff;--ink:#1f2937;--muted:#6b7280;--border:#d1d5db}
body{margin:20px;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--ink)}
.container{max-width:1500px;margin:auto;background:var(--card);padding:20px;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h1{margin-top:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{border:1px solid var(--border);padding:14px;border-radius:8px}
label{display:block;margin-top:8px;font-size:14px;color:var(--muted)}
input,select{width:100%;box-sizing:border-box;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;font-size:15px}
button{padding:10px 14px;margin:6px 6px 6px 0;border:0;border-radius:6px;background:#111827;color:white;cursor:pointer}
button:hover{background:#374151}
.results{margin-top:12px;font-weight:bold;line-height:1.5}
.lookup{margin-top:20px;padding:14px;border:1px solid var(--border);border-radius:8px;background:#fafafa}
.lookup-row{display:grid;grid-template-columns:220px 1fr;gap:10px;align-items:end}
#lookupResults{margin-top:12px;line-height:1.6;font-weight:bold}
.chart-wrap{margin-top:12px;height:720px}
canvas{width:100%;height:100%}
.note{color:var(--muted);font-size:13px;margin-top:6px}
@media(max-width:800px){.grid{grid-template-columns:1fr}.lookup-row{grid-template-columns:1fr}.chart-wrap{height:560px}}
</style>
</head>
<body>
<div class="container">
<h1>NFPA 291 Dual Flow Curve Calculator</h1>

<div class="grid">
  <div class="panel">
    <h3>Flow Test A</h3>
    <label>Static Pressure (psi)</label><input id="sA" type="number" step="0.001" value="70">
    <label>Residual Pressure (psi)</label><input id="rA" type="number" step="0.001" value="55">
    <label>Residual Flow (gpm)</label><input id="qA" type="number" step="0.001" value="1500">
    <div class="results" id="resA"></div>
  </div>
  <div class="panel">
    <h3>Flow Test B</h3>
    <label>Static Pressure (psi)</label><input id="sB" type="number" step="0.001" value="65">
    <label>Residual Pressure (psi)</label><input id="rB" type="number" step="0.001" value="48">
    <label>Residual Flow (gpm)</label><input id="qB" type="number" step="0.001" value="1400">
    <div class="results" id="resB"></div>
  </div>
</div>

<div class="lookup">
  <h3>Flow ↔ Pressure Lookup</h3>
  <div class="lookup-row">
    <div>
      <label>Lookup Mode</label>
      <select id="lookupMode">
        <option value="flow">Flow → Pressure</option>
        <option value="pressure">Pressure → Flow</option>
      </select>
    </div>
    <div>
      <label>Value</label>
      <input id="lookupValue" type="number" step="0.001" placeholder="Enter flow or pressure">
    </div>
  </div>
  <div id="lookupResults"></div>
  <div class="note">nat20fire.com</div>
</div>

<br>
<button onclick="exportPNG()">Export PNG</button>

<div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>

<script>
let chart;

function fmt(n){if(!Number.isFinite(n))return"N/A";return Number(n).toFixed(3)}
function getInputs(){return{sA:+document.getElementById('sA').value,rA:+document.getElementById('rA').value,qA:+document.getElementById('qA').value,sB:+document.getElementById('sB').value,rB:+document.getElementById('rB').value,qB:+document.getElementById('qB').value}}
function qToX(q){if(!Number.isFinite(q)||q<0)return NaN;return Math.pow(q,1.85)}
function xToQ(x){if(!Number.isFinite(x)||x<0)return NaN;return Math.pow(x,1/1.85)}
function availableFlow(ps,pr,qr,p){if(ps<=pr||ps<p||qr<=0)return NaN;return qr*Math.pow((ps-p)/(ps-pr),0.54)}
function pressureAtFlow(ps,pr,qr,q){if(ps<=pr||qr<=0||q<0)return NaN;return ps-(ps-pr)*Math.pow(q/qr,1.85)}
function availableFlow20(ps,pr,qr){return availableFlow(ps,pr,qr,20)}
function zeroPressureFlow(ps,pr,qr){return availableFlow(ps,pr,qr,0)}

function buildStraightSupplyLine(ps,pr,qr){
  const q0=zeroPressureFlow(ps,pr,qr);
  return [
    {x:qToX(0),y:ps,actualFlow:0},
    {x:qToX(qr),y:pr,actualFlow:qr},
    {x:qToX(q0),y:0,actualFlow:q0}
  ].filter(p=>Number.isFinite(p.x)&&Number.isFinite(p.y));
}

function runLookup(){
  const mode=document.getElementById('lookupMode').value;
  const value=parseFloat(document.getElementById('lookupValue').value);
  const i=getInputs();
  if(!Number.isFinite(value)){document.getElementById('lookupResults').innerHTML="";return}

  let html='';
  if(mode==='flow'){
    const pA=pressureAtFlow(i.sA,i.rA,i.qA,value);
    const pB=pressureAtFlow(i.sB,i.rB,i.qB,value);
    html=`<div>At ${fmt(value)} gpm:</div><div>Curve A Pressure: ${fmt(pA)} psi</div><div>Curve B Pressure: ${fmt(pB)} psi</div>`;
  }else{
    const fA=availableFlow(i.sA,i.rA,i.qA,value);
    const fB=availableFlow(i.sB,i.rB,i.qB,value);
    html=`<div>At ${fmt(value)} psi:</div><div>Curve A Flow: ${fmt(fA)} gpm</div><div>Curve B Flow: ${fmt(fB)} gpm</div>`;
  }
  document.getElementById('lookupResults').innerHTML=html;
}

function makeFlowTicks(maxFlow){
  const baseTicks=[0,500,1000,1500,2000,2500,3000,4000,5000,7500,10000,15000,20000,30000,50000];
  return baseTicks.filter(v=>v<=maxFlow);
}

function readableMaxFlow(maxDataFlow){
  if(!Number.isFinite(maxDataFlow)||maxDataFlow<=0)return 3000;
  const raw=maxDataFlow*1.03;
  const options=[1000,1500,2000,2500,3000,3500,4000,4500,5000,6000,7500,10000,12500,15000,20000,30000,50000];
  for(const o of options){if(raw<=o)return o}
  return Math.ceil(raw/5000)*5000;
}

const flowAxisPlugin={
  id:'flowAxisPlugin',
  afterBuildTicks(chart,args,options){
    const scale=args.scale;
    if(scale.id!=='x')return;
    const maxFlow=options.maxFlow||5000;
    scale.ticks=makeFlowTicks(maxFlow).map(flow=>({value:qToX(flow)}));
  }
};

function updateGraph(){
  const i=getInputs();
  const af20A=availableFlow20(i.sA,i.rA,i.qA);
  const af20B=availableFlow20(i.sB,i.rB,i.qB);
  const zeroA=zeroPressureFlow(i.sA,i.rA,i.qA);
  const zeroB=zeroPressureFlow(i.sB,i.rB,i.qB);

  document.getElementById('resA').innerHTML="Available Flow @ 20 psi: "+fmt(af20A)+" gpm<br>Zero-Pressure Flow: "+fmt(zeroA)+" gpm";
  document.getElementById('resB').innerHTML="Available Flow @ 20 psi: "+fmt(af20B)+" gpm<br>Zero-Pressure Flow: "+fmt(zeroB)+" gpm";

  const maxDataFlow=Math.max(i.qA,i.qB,af20A,af20B,zeroA,zeroB,1000);
  const maxFlow=readableMaxFlow(maxDataFlow);
  const maxPressure=Math.ceil(Math.max(i.sA,i.sB,100)*1.05/10)*10;

  const datasets=[
    {label:'Supply Curve A',data:buildStraightSupplyLine(i.sA,i.rA,i.qA),parsing:false,borderColor:'#0b57d0',backgroundColor:'#0b57d0',pointRadius:6,pointHoverRadius:8,borderWidth:2.5,tension:0},
    {label:'Supply Curve B',data:buildStraightSupplyLine(i.sB,i.rB,i.qB),parsing:false,borderColor:'#c5221f',backgroundColor:'#c5221f',pointRadius:6,pointHoverRadius:8,borderWidth:2.5,tension:0}
  ];

  if(chart)chart.destroy();

  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{datasets},
    plugins:[flowAxisPlugin],
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false,
      layout:{padding:{left:12,right:28,top:8,bottom:18}},
      interaction:{mode:'nearest',intersect:false},
      plugins:{
        title:{display:true,text:'NFPA 291 Dual Water Supply Curves'},
        flowAxisPlugin:{maxFlow:maxFlow},
        tooltip:{callbacks:{label:function(ctx){
          const flow=ctx.raw&&Number.isFinite(ctx.raw.actualFlow)?ctx.raw.actualFlow:xToQ(ctx.parsed.x);
          return ctx.dataset.label+": "+fmt(flow)+" gpm, "+fmt(ctx.parsed.y)+" psi";
        }}},
        legend:{display:true}
      },
      scales:{
        x:{
          type:'linear',
          min:0,
          max:qToX(maxFlow),
          title:{display:true,text:'Flow (GPM)'},
          ticks:{
            autoSkip:false,
            maxRotation:0,
            minRotation:0,
            callback:function(value){
              const flow=xToQ(value);
              if(!Number.isFinite(flow))return"";
              return Math.round(flow).toLocaleString();
            }
          },
          grid:{display:true}
        },
        y:{
          type:'linear',
          min:0,
          max:maxPressure,
          title:{display:true,text:'Pressure (PSI)'},
          ticks:{stepSize:10,callback:function(value){return value.toFixed(0)}},
          grid:{display:true}
        }
      }
    }
  });

  runLookup();
}

function exportPNG(){
  const a=document.createElement('a');
  a.href=document.getElementById('chart').toDataURL('image/png');
  a.download='NFPA291_DualCurve_Straight_Q185_Axis_NoRedundantButtons.png';
  a.click();
}

["sA","rA","qA","sB","rB","qB"].forEach(id=>{document.getElementById(id).addEventListener("input",updateGraph)});
document.getElementById("lookupMode").addEventListener("change",updateGraph);
document.getElementById("lookupValue").addEventListener("input",runLookup);

updateGraph();
</script>
</body>
</html>
